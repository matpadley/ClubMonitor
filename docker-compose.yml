services:
  db:
    image: postgres:16
    container_name: clubmonitor-db
    environment:
      POSTGRES_DB: clubmonitor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - clubmonitor_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d clubmonitor"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  clubmonitor_pgdata: